<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | UrbanThread Style</title>
  <meta name="description" content="Contact UrbanThread Style for support, feedback, and collaboration inquiries." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.yourdomain.com/contact.html" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <h1 class="logo">UrbanThread Style</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="disclaimer.html">Disclaimer</a>
      </nav>
    </div>
  </header>

  <main class="container article" style="margin-top:30px;">
    <h2>Contact Us</h2>
    <p>
      For questions, suggestions, correction requests, or partnership opportunities, please contact us using the form below.
    </p>

    <form action="#" method="post" style="max-width:680px;">
      <label for="name">Full Name</label><br />
      <input id="name" name="name" type="text" required style="width:100%;padding:10px;margin:8px 0 16px;border:1px solid #ddd;border-radius:8px;" />

      <label for="email">Email Address</label><br />
      <input id="email" name="email" type="email" required style="width:100%;padding:10px;margin:8px 0 16px;border:1px solid #ddd;border-radius:8px;" />

      <label for="message">Message</label><br />
      <textarea id="message" name="message" rows="6" required style="width:100%;padding:10px;margin:8px 0 16px;border:1px solid #ddd;border-radius:8px;"></textarea>

      <button class="btn" type="submit">Send Message</button>
    </form>
  </main>

  <footer>
    <div class="container footer-wrap">
      <p>© 2026 UrbanThread Style. All rights reserved.</p>
      <div class="footer-links">
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="disclaimer.html">Disclaimer</a>
      </div>
    </div>
  </footer>
</body>
</html>
